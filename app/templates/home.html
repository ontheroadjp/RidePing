<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>この電車に乗ってるよ</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="phone">
      <header class="topbar">
        <h1>この電車に乗ってるよ</h1>
        <p>大江戸線 固定MVP</p>
      </header>

      <section class="card">
        <h2>保護者設定</h2>
        <form method="post" action="/settings" class="stack">
          <label>保護者メール
            <input type="email" name="parent_email" value="{{ setting['parent_email'] }}" required />
          </label>
          <label>子どもの表示名
            <input type="text" name="child_name" value="{{ setting['child_name'] }}" required />
          </label>
          <label>最寄駅
            <select name="home_station" required>
              {% for station in stations %}
              <option value="{{ station }}" {% if station == setting['home_station'] %}selected{% endif %}>{{ station }}</option>
              {% endfor %}
            </select>
          </label>
          <button class="btn" type="submit">保存</button>
        </form>
      </section>

      <section class="card">
        <h2>乗車連絡</h2>
        <a class="btn primary" href="/trains">今乗ってる電車を選ぶ</a>
      </section>

      <section class="card">
        <h2>送信履歴</h2>
        <ul class="history">
          {% for r in reports %}
          <li>{{ r['created_at'] }} / {{ r['train_number'] }} / 到着予定 {{ r['eta_home'] }}</li>
          {% else %}
          <li>履歴なし</li>
          {% endfor %}
        </ul>
      </section>

      <nav class="tabbar">
        <a class="active" href="/">ホーム</a>
        <a href="/trains">乗車連絡</a>
      </nav>
    </main>
  </body>
</html>
